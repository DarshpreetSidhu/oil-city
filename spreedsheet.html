<!DOCTYPE html>
<html>

<head></head>

<body>
  <div>
    <form name="demo-oil-city-contact">
      <div>
        <label>Enter your First Name :</label>
        <input type="text" name="First Name" placeholder="Enter your first name"/>
      </div>
      <div>
        <label>Enter your Last Name :</label>
        <input type="text" name="Last Name" placeholder="Enter your last name"/>
      </div>
      <div>
        <label>Enter your Email Id :</label>
        <input type="text" name="Email Id" placeholder="Enter your email Id"/>
      </div>
      <div>
        <label>Enter your Message :</label>
        <textarea type="text" name="Message" placeholder="Enter your message"></textarea>
      </div>
      <button type="submit">Submit Form</button>
    </form>
  </div>

  <script src="https://wzrd.in/standalone/formdata-polyfill"></script>
  <script src="https://wzrd.in/standalone/promise-polyfill@latest"></script>
  <script src="https://wzrd.in/standalone/whatwg-fetch@latest"></script>
  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyBBRYQVFaMYMknrYRy9M3wG93EKKhYhtHglzeZ8qGhPJr26f6bkyY_NUCvl-f9XbYr/exec';
    const form = document.forms['demo-oil-city-contact']
  
    form.addEventListener('submit', e => {
      e.preventDefault()
      fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(response =>{ 
          alert('Form has been submitted successfully!')
        })
        .catch(error => console.error('Error!', error.message))
    })
  </script>
